<style>

<script>
(function() {
    /* INJECTED_DATA_START */
    const EMBEDDED_DATA = null;
    /* INJECTED_DATA_END */

    const genId = (prefix) => `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,6)}`;

    function showLoading(text) { const overlay = document.getElementById('pdf-overlay'); document.getElementById('overlay-text').textContent = text; overlay.classList.add('active'); }
    function hideLoading() { document.getElementById('pdf-overlay').classList.remove('active'); document.getElementById('pdf-progress').textContent = ''; }

    const DB_NAME = 'FlowManualDB'; const DB_VERSION = 1;
    const StorageManager = {
        db: null, isMemoryMode: false, memoryAttachments: {},
        async init() {
            try {
                return await new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('projects')) db.createObjectStore('projects', { keyPath: 'projectId' });
                        if (!db.objectStoreNames.contains('attachments')) { const attStore = db.createObjectStore('attachments', { keyPath: 'id' }); attStore.createIndex('byProject', 'projectId', { unique: false }); }
                    };
                    request.onsuccess = (e) => { this.db = e.target.result; resolve(); }; request.onerror = (e) => reject(e);
                });
            } catch (error) { this.isMemoryMode = true; }
        },
        async saveProject(projectId, stateData) {
            if (this.isMemoryMode || !this.db) return;
            return new Promise((resolve, reject) => { const tx = this.db.transaction('projects', 'readwrite'); tx.objectStore('projects').put({ projectId, data: stateData, updatedAt: new Date().getTime() }); tx.oncomplete = () => resolve(); tx.onerror = (e) => reject(e); });
        },
        async getLatestProject() {
            if (this.isMemoryMode || !this.db) return null;
            return new Promise((resolve, reject) => { const tx = this.db.transaction('projects', 'readonly'); const req = tx.objectStore('projects').getAll(); req.onsuccess = () => { const projects = req.result; if (projects.length === 0) resolve(null); else { projects.sort((a, b) => b.updatedAt - a.updatedAt); resolve(projects[0].data); } }; req.onerror = (e) => reject(e); });
        },
        async saveAttachment(attInfo, fileBlob) {
            if (this.isMemoryMode) {
                this.memoryAttachments[attInfo.id] = { ...attInfo, blob: fileBlob };
                return;
            }
            if (!this.db) return;
            return new Promise((resolve, reject) => { const tx = this.db.transaction('attachments', 'readwrite'); tx.objectStore('attachments').put({ ...attInfo, blob: fileBlob }); tx.oncomplete = () => resolve(); tx.onerror = (e) => reject(e); });
        },
        async deleteAttachment(id) {
            if (this.isMemoryMode) { delete this.memoryAttachments[id]; return; }
            if (!this.db) return;
            return new Promise((resolve, reject) => { const tx = this.db.transaction('attachments', 'readwrite'); tx.objectStore('attachments').delete(id); tx.oncomplete = () => resolve(); tx.onerror = (e) => reject(e); });
        },
        async getAttachmentsByProject(projectId) {
            if (this.isMemoryMode) { return Object.values(this.memoryAttachments).filter(att => att.projectId === projectId); }
            if (!this.db) return [];
            return new Promise((resolve, reject) => { const tx = this.db.transaction('attachments', 'readonly'); const index = tx.objectStore('attachments').index('byProject'); const req = index.getAll(projectId); req.onsuccess = () => resolve(req.result); req.onerror = (e) => reject(e); });
        },
        async getAttachmentBlob(id) {
            if (this.isMemoryMode) {
                const att = this.memoryAttachments[id];
                return att ? att.blob : null;
            }
            if (!this.db) return null;
            return new Promise((resolve, reject) => {
                const tx = this.db.transaction('attachments', 'readonly');
                const req = tx.objectStore('attachments').get(id);
                req.onsuccess = () => resolve(req.result ? req.result.blob : null);
                req.onerror = (e) => reject(e);
            });
        }
    };

    const defaultV1State = { title: "新規事業 展開フロー", date: new Date().toLocaleDateString('ja-JP'), author: "山田 太郎", flows: [{ name: "フェーズ1", isOpen: true, isBottleneck: false, children: [{ name: "ステップ1", isOpen: true, isBottleneck: false, children: [{ name: "詳細手順", isBottleneck: false }] }] }] };
    function migrateV1toV2(v1State) {
        if (v1State.meta && v1State.meta.version === "2.0.0") return v1State;
        return {
            meta: { version: "2.0.0", projectId: `proj_${Date.now().toString(36)}`, title: v1State.title || "無題", date: v1State.date || new Date().toLocaleDateString('ja-JP'), author: v1State.author || "", createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
            flows: v1State.flows.map(l => ({ ...l, id: genId('L'), children: l.children.map(m => ({ ...m, id: genId('M'), children: m.children.map(s => ({ ...s, id: genId('S'), linkedFlowId: null, manual: { summary: "", steps: [], notes: "", linkedFlows: [] } })) })) }))
        };
    }

    let state = null; let currentScale = 1.0; let currentManualPath = null;
    let history = []; let historyIndex = -1; const MAX_HISTORY = 50;
    const PAGE_SIZES = { w: 1123, h: 794, mmW: 297, mmH: 210 };
    let previewNodeMap = new Map();

    function serializeForHistory(obj) { return JSON.stringify(obj, (key, value) => (key === 'thumbnail' || key === 'blob') ? undefined : value); }
    
    let _saveTimer;
    function debouncedSaveOnly() { 
        clearTimeout(_saveTimer); 
        _saveTimer = setTimeout(() => { StorageManager.saveProject(state.meta.projectId, state).catch(e => console.warn(e)); }, 500); 
    }

    function pushHistory() {
        if (!state) return; 
        const currentStateStr = serializeForHistory(state); 
        if (historyIndex >= 0 && history[historyIndex] === currentStateStr) return;
        history = history.slice(0, historyIndex + 1); 
        history.push(currentStateStr); 
        if (history.length > MAX_HISTORY) history.shift();
        historyIndex = history.length - 1; 
        const u = document.getElementById('btn-undo'), r = document.getElementById('btn-redo'); 
        if(u) u.disabled = historyIndex <= 0; 
        if(r) r.disabled = historyIndex >= history.length - 1;
    }

    function markDirty() { 
        pushHistory();
        debouncedSaveOnly(); 
    } 

    function undo() { 
        if (historyIndex <= 0) return; 
        historyIndex--; 
        state = JSON.parse(history[historyIndex]); 
        renderFull(); 
        debouncedSaveOnly();
    }
    
    function redo() { 
        if (historyIndex >= history.length - 1) return; 
        historyIndex++; 
        state = JSON.parse(history[historyIndex]); 
        renderFull(); 
        debouncedSaveOnly(); 
    }

    const escapeHTML = (v) => (v == null ? '' : String(v)).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    function getTimestamp() { const now = new Date(); const pad = (n) => String(n).padStart(2, '0'); return `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`; }
    function getSafeFilename(t, ts) { return (t.replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, '_').slice(0, 60) || 'flow') + '_' + ts; }
    
    function getFlowByPath(path) {
        if (!path) return null;
        const parts = path.split('-').map(Number);
        let node = null;
        let list = state.flows;
        for (const idx of parts) {
            if (!Array.isArray(list) || idx < 0 || idx >= list.length) return null;
            node = list[idx];
            list = node.children;
        }
        return node;
    }

    function findFlowById(id) { for (let l of state.flows) { if (l.id === id) return { type: 'L', flow: l }; for (let m of l.children) { if (m.id === id) return { type: 'M', flow: m, parentL: l }; for (let s of m.children) { if (s.id === id) return { type: 'S', flow: s, parentM: m, parentL: l }; } } } return null; }
    function checkIsLinked(targetId) { let isLinked = false; state.flows.forEach(l => l.children.forEach(m => m.children.forEach(s => { if (s.manual && s.manual.linkedFlows && s.manual.linkedFlows.includes(targetId)) isLinked = true; }))); return isLinked; }
    
    function generateThumbnail(file) {
        return new Promise((resolve, reject) => {
            if (!file || !file.type.startsWith('image/')) {
                resolve(null);
                return;
            }
            const reader = new FileReader();
            reader.onerror = () => reject(new Error('FileReader error'));
            reader.onload = (e) => {
                const img = new Image();
                img.onerror = () => reject(new Error('Image load error'));
                img.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        const scale = Math.min(200 / img.width, 1);
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    } catch (err) {
                        reject(err);
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }).catch(err => {
            console.warn('[Thumbnail Error]', err);
            return null;
        });
    }

    // --- MD Parser Logic ---
    function createEmptyImportedState() { return { meta: { version: "2.0.0", projectId: `proj_${Date.now().toString(36)}`, title: "無題", date: new Date().toLocaleDateString('ja-JP'), author: "", createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }, flows: [] }; }
    function createLargeFlow(name, isBottleneck = false) { return { id: genId('L'), name: name || "大フロー", isOpen: true, isBottleneck, children: [] }; }
    function createMiddleFlow(name, isBottleneck = false) { return { id: genId('M'), name: name || "中フロー", isOpen: true, isBottleneck, children: [] }; }
    function createSmallFlow(name, isBottleneck = false) { return { id: genId('S'), name: name || "小フロー", isBottleneck, linkedFlowId: null, manual: { summary: "", steps: [], notes: "", linkedFlows: [] } }; }
    function createManualStep(order, title = "") { return { id: genId('step'), order, title, description: "", attachments: [] }; }
    function normalizeMultilineText(text) { return text ? text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/\n{3,}/g, '\n\n').trim() : ""; }
    function appendMultilineField(target, fieldName, value) { if (!target || !fieldName || !value) return; if (!target[fieldName]) target[fieldName] = value; else target[fieldName] += '\n' + value; }
    function stripBottleneckSuffix(text) { const isBottleneck = /\s*\[ボトルネック\]\s*$/.test(text); const clean = text.replace(/\s*\[ボトルネック\]\s*$/, '').trim(); return { clean, isBottleneck }; }
    function extractLinkedFlowId(text) { let m = text.match(/^🔗\s*->\s*\[[^\]]+\]\(([^)]+)\)\s*$/); if (m) return m[1].trim(); m = text.match(/^🔗\s*->\s*([A-Za-z0-9_\-:\.]+)\s*$/); if (m) return m[1].trim(); return null; }
    function ensureLargeFlow(newState, currentLargeFlowRef) { if (currentLargeFlowRef.value) return currentLargeFlowRef.value; currentLargeFlowRef.value = createLargeFlow("大フロー", false); newState.flows.push(currentLargeFlowRef.value); return currentLargeFlowRef.value; }
    function ensureMiddleFlow(newState, currentLargeFlowRef, currentMiddleFlowRef) { if (currentMiddleFlowRef.value) return currentMiddleFlowRef.value; const l = ensureLargeFlow(newState, currentLargeFlowRef); currentMiddleFlowRef.value = createMiddleFlow("中フロー", false); l.children.push(currentMiddleFlowRef.value); return currentMiddleFlowRef.value; }

    function finalizeImportedState(newState) {
        newState.meta.title = normalizeMultilineText(newState.meta.title || "無題") || "無題"; newState.meta.date = normalizeMultilineText(newState.meta.date || new Date().toLocaleDateString('ja-JP')); newState.meta.author = normalizeMultilineText(newState.meta.author || "");
        newState.flows.forEach(l => {
            l.name = normalizeMultilineText(l.name || "大フロー") || "大フロー"; l.children = l.children || [];
            l.children.forEach(m => {
                m.name = normalizeMultilineText(m.name || "中フロー") || "中フロー"; m.children = m.children || [];
                m.children.forEach((s, sIndex) => {
                    s.name = normalizeMultilineText(s.name || `小フロー${sIndex + 1}`) || `小フロー${sIndex + 1}`;
                    if (!s.manual) s.manual = { summary: "", steps: [], notes: "", linkedFlows: [] };
                    s.manual.summary = normalizeMultilineText(s.manual.summary); s.manual.notes = normalizeMultilineText(s.manual.notes);
                    if (!Array.isArray(s.manual.linkedFlows)) s.manual.linkedFlows = []; s.manual.linkedFlows = [...new Set(s.manual.linkedFlows.filter(Boolean))];
                    if (!Array.isArray(s.manual.steps)) s.manual.steps = [];
                    s.manual.steps = s.manual.steps.map((step, idx) => ({ id: step.id || genId('step'), order: idx + 1, title: normalizeMultilineText(step.title || `Step ${idx + 1}`) || `Step ${idx + 1}`, description: normalizeMultilineText(step.description || ""), attachments: Array.isArray(step.attachments) ? step.attachments : [] }));
                });
            });
        });
        return newState;
    }

    function parseRichMarkdownToState(markdownText) {
        const lines = String(markdownText || "").replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
        const newState = createEmptyImportedState(); const currentLargeFlowRef = { value: null }; const currentMiddleFlowRef = { value: null };
        let currentSmallFlow = null; let currentStep = null; let sectionMode = 'none'; const warnings = []; const unresolvedLinkIds = [];
        function resetManualContext() { currentSmallFlow = null; currentStep = null; sectionMode = 'none'; }
        function pushWarning(lineNo, message, raw) { warnings.push({ line: lineNo, message, text: raw }); }

        lines.forEach((rawLine, index) => {
            const lineNo = index + 1; const text = rawLine.trim(); if (!text) return;
            const { clean, isBottleneck } = stripBottleneckSuffix(text);

            if (clean.startsWith('# ')) { newState.meta.title = clean.substring(2).trim() || "無題"; currentLargeFlowRef.value = null; currentMiddleFlowRef.value = null; resetManualContext(); return; }
            if (clean.startsWith('date:')) { newState.meta.date = clean.substring(5).trim(); return; }
            if (clean.startsWith('author:')) { newState.meta.author = clean.substring(7).trim(); return; }
            if (clean.startsWith('## ')) { const l = createLargeFlow(clean.substring(3).trim(), isBottleneck); newState.flows.push(l); currentLargeFlowRef.value = l; currentMiddleFlowRef.value = null; resetManualContext(); return; }
            if (clean.startsWith('### ')) { const parentL = ensureLargeFlow(newState, currentLargeFlowRef); const m = createMiddleFlow(clean.substring(4).trim(), isBottleneck); parentL.children.push(m); currentMiddleFlowRef.value = m; resetManualContext(); return; }
            if (clean.startsWith('- ') || clean.startsWith('* ')) { const parentM = ensureMiddleFlow(newState, currentLargeFlowRef, currentMiddleFlowRef); const s = createSmallFlow(clean.substring(2).trim(), isBottleneck); parentM.children.push(s); currentSmallFlow = s; currentStep = null; sectionMode = 'none'; return; }

            if (!currentSmallFlow) { pushWarning(lineNo, '小フロー外のため解釈できない行を無視しました', rawLine); return; }

            if (clean.startsWith('> ')) { appendMultilineField(currentSmallFlow.manual, 'summary', clean.substring(2).trim()); currentStep = null; sectionMode = 'summary'; return; }
            if (/^\d+\.\s+/.test(clean)) { const title = clean.replace(/^\d+\.\s+/, '').trim(); const step = createManualStep(currentSmallFlow.manual.steps.length + 1, title); currentSmallFlow.manual.steps.push(step); currentStep = step; sectionMode = 'steps'; return; }
            if (clean === '---') { currentStep = null; sectionMode = 'notes-links'; return; }
            if (clean.startsWith('備考:')) { appendMultilineField(currentSmallFlow.manual, 'notes', clean.substring(3).trim()); currentStep = null; sectionMode = 'notes-continuation'; return; }
            if (clean.startsWith('🔗')) { const linkId = extractLinkedFlowId(clean); if (linkId) { currentSmallFlow.manual.linkedFlows.push(linkId); unresolvedLinkIds.push(linkId); } else pushWarning(lineNo, '関連リンクの書式を解釈できませんでした', rawLine); currentStep = null; sectionMode = 'notes-links'; return; }

            if (currentStep) { appendMultilineField(currentStep, 'description', clean); return; }
            if (sectionMode === 'notes-continuation' && currentSmallFlow.manual.notes) { appendMultilineField(currentSmallFlow.manual, 'notes', clean); return; }
            if (sectionMode === 'summary' && currentSmallFlow.manual.summary) { appendMultilineField(currentSmallFlow.manual, 'summary', clean); return; }
            pushWarning(lineNo, '文脈に紐づけられない行を無視しました', rawLine);
        });

        const finalizedState = finalizeImportedState(newState); const allIds = new Set();
        finalizedState.flows.forEach(l => { allIds.add(l.id); l.children.forEach(m => { allIds.add(m.id); m.children.forEach(s => allIds.add(s.id)); }); });
        const unresolvedAfterParse = [];
        finalizedState.flows.forEach(l => l.children.forEach(m => m.children.forEach(s => { s.manual.linkedFlows.forEach(id => { if (!allIds.has(id)) unresolvedAfterParse.push({ sourceFlowName: s.name, targetId: id }); }); })));

        return { state: finalizedState, warnings, unresolvedLinks: unresolvedAfterParse };
    }

    function setupDragAndDrop() {
        const formContainer = document.getElementById('form-container');
        let draggedPath = null, draggedType = null, draggedParent = null;

        formContainer.addEventListener('mousedown', (e) => {
            if (e.target.closest('.drag-handle')) {
                const item = e.target.closest('.flow-drag-item');
                if (item) item.setAttribute('draggable', 'true');
            }
        });

        formContainer.addEventListener('dragstart', (e) => {
            const item = e.target.closest('.flow-drag-item');
            if (!item || !item.hasAttribute('draggable')) { e.preventDefault(); return; }
            draggedPath = item.dataset.dragPath; draggedType = item.dataset.dragType; draggedParent = draggedPath.split('-').slice(0, -1).join('-');
            e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', draggedPath);
            setTimeout(() => item.classList.add('opacity-50'), 0); e.stopPropagation();
        });

        formContainer.addEventListener('dragend', (e) => {
            const item = e.target.closest('.flow-drag-item'); if (item) { item.classList.remove('opacity-50'); item.removeAttribute('draggable'); }
            formContainer.querySelectorAll('.drop-above, .drop-below').forEach(el => el.classList.remove('drop-above', 'drop-below'));
            draggedPath = null; draggedType = null; draggedParent = null;
        });

        formContainer.addEventListener('dragover', (e) => {
            e.preventDefault(); e.dataTransfer.dropEffect = 'move';
            const targetItem = e.target.closest('.flow-drag-item'); if (!targetItem || !draggedPath) return;
            if (draggedType !== targetItem.dataset.dragType || draggedParent !== targetItem.dataset.dragPath.split('-').slice(0, -1).join('-') || targetItem.dataset.dragPath === draggedPath) return;
            const rect = targetItem.getBoundingClientRect();
            formContainer.querySelectorAll('.drop-above, .drop-below').forEach(el => el.classList.remove('drop-above', 'drop-below'));
            if (e.clientY < rect.top + rect.height / 2) targetItem.classList.add('drop-above'); else targetItem.classList.add('drop-below');
        });

        formContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            formContainer.querySelectorAll('.drop-above, .drop-below').forEach(el => el.classList.remove('drop-above', 'drop-below'));
            const targetItem = e.target.closest('.flow-drag-item'); if (!targetItem || !draggedPath) return;
            if (draggedType !== targetItem.dataset.dragType || draggedParent !== targetItem.dataset.dragPath.split('-').slice(0, -1).join('-') || targetItem.dataset.dragPath === draggedPath) return;

            const insertPosition = (e.clientY < targetItem.getBoundingClientRect().top + targetItem.getBoundingClientRect().height / 2) ? 'before' : 'after';
            if (currentManualPath) closeManualPanel();

            const srcParts = draggedPath.split('-').map(Number); const tgtParts = targetItem.dataset.dragPath.split('-').map(Number);
            let parentArray = state.flows;
            if (srcParts.length === 2) parentArray = state.flows[srcParts[0]].children;
            else if (srcParts.length === 3) parentArray = state.flows[srcParts[0]].children[srcParts[1]].children;

            const srcIndex = srcParts[srcParts.length - 1]; let tgtIndex = tgtParts[tgtParts.length - 1];
            const [movedItem] = parentArray.splice(srcIndex, 1);
            if (srcIndex < tgtIndex) tgtIndex--;
            if (insertPosition === 'after') tgtIndex++;

            parentArray.splice(tgtIndex, 0, movedItem);
            renderFull(); markDirty();
        });
    }

            if (btn.classList.contains('btn-remove')) {

            }

            const btnClear = e.target.closest('#btn-clear-all');

        });

        manualBody.addEventListener('input', (e) => { const target = e.target; const flow = getFlowByPath(currentManualPath); if(!flow) return; if (target.dataset.field && target.dataset.index === undefined) { flow.manual[target.dataset.field] = target.value; markDirty(); } else if (target.dataset.index !== undefined) { flow.manual.steps[target.dataset.index][target.dataset.field] = target.value; markDirty(); } });
        manualBody.addEventListener('click', async (e) => {

            if (btn.classList.contains('btn-remove-step')) { if(!confirm('ステップを削除しますか？')) return; flow.manual.steps.splice(btn.dataset.index, 1); markDirty(); renderManualPanel(); return; }

                const step = flow.manual.steps[btn.dataset.stepIndex]; const attId = btn.dataset.attId; await StorageManager.deleteAttachment(attId); step.attachments = step.attachments.filter(a => a.id !== attId); markDirty(); renderManualPanel(); return;

        });

    let tooltipTimeout;
    
    function moveTooltipCarouselLocal(dir, totalSteps) {
        const tooltip = document.getElementById('manual-tooltip');
        const track = document.getElementById('tooltip-carousel-track');
        if (!track) return;
        
        let current = parseInt(tooltip.dataset.currentStep || 0, 10);
        current += dir;
        if (current < 0) current = 0;
        if (current >= totalSteps) current = totalSteps - 1;
        
        tooltip.dataset.currentStep = current;
        track.style.transform = `translateX(-${current * 360}px)`;
    }

    function setupTooltipAndViewer() {
        const previewWrapper = document.getElementById('preview-wrapper');
        const tooltip = document.getElementById('manual-tooltip');
        let viewerSlides = []; let viewerCurrentIndex = -1; let viewerCurrentObjectUrl = null;
        const viewer = document.getElementById('image-viewer'); const viewerImg = document.getElementById('viewer-img');
        const viewerLoading = document.getElementById('viewer-loading'); const btnCloseViewer = document.getElementById('btn-close-viewer');
        const viewerDownload = document.getElementById('viewer-download');
        
        previewWrapper.addEventListener('pointerover', (e) => {
            const icon = e.target.closest('.manual-preview-icon');
            if (icon) { clearTimeout(tooltipTimeout); requestAnimationFrame(() => { const flowId = icon.dataset.flowId; const data = findFlowById(flowId); if (data && data.flow.manual) { showManualTooltip(icon, data.flow.manual, data.flow.name); } }); }
        });
        previewWrapper.addEventListener('pointerout', (e) => { const icon = e.target.closest('.manual-preview-icon'); if (icon) { tooltipTimeout = setTimeout(() => hideManualTooltip(), 200); } });
        tooltip.addEventListener('pointerenter', () => clearTimeout(tooltipTimeout));
        tooltip.addEventListener('pointerleave', () => { tooltipTimeout = setTimeout(() => hideManualTooltip(), 200); });
        previewWrapper.addEventListener('click', (e) => { const icon = e.target.closest('.manual-preview-icon'); if (icon) { e.stopPropagation(); hideManualTooltip(); const path = icon.dataset.path; if (path) openManualPanel(path); } });

        function collectViewerSlides(clickedEl) {
            const attachmentEls = Array.from(tooltip.querySelectorAll('[data-att-id]')); const stepMap = new Map();
            attachmentEls.forEach(el => {
                const stepIndex = Number(el.dataset.stepIndex ?? -1); if (stepIndex < 0) return;
                if (!stepMap.has(stepIndex)) { stepMap.set(stepIndex, { stepIndex, attId: el.dataset.attId, filename: el.dataset.filename || 'attachment', stepNo: el.dataset.stepNo || `Step ${stepIndex + 1}`, stepTitle: el.dataset.stepTitle || 'タイトル未設定', stepDescription: el.dataset.stepDescription || '説明はありません' }); }
            });
            viewerSlides = Array.from(stepMap.values()).sort((a, b) => a.stepIndex - b.stepIndex);
            const clickedStepIndex = Number(clickedEl.dataset.stepIndex ?? -1); viewerCurrentIndex = viewerSlides.findIndex(slide => slide.stepIndex === clickedStepIndex);
            if (viewerCurrentIndex < 0 && viewerSlides.length > 0) viewerCurrentIndex = 0;
        }

        async function openViewerSlide(index) {
            if (index < 0 || index >= viewerSlides.length) return;
            viewerCurrentIndex = index; const slide = viewerSlides[index];
            document.getElementById('viewer-step-no').textContent = slide.stepNo;
            document.getElementById('viewer-step-title').textContent = slide.stepTitle;
            document.getElementById('viewer-step-description').textContent = slide.stepDescription;
            document.getElementById('viewer-step-position').textContent = `${viewerCurrentIndex + 1} / ${viewerSlides.length}`;
            document.getElementById('btn-viewer-prev-step').disabled = viewerCurrentIndex <= 0;
            document.getElementById('btn-viewer-next-step').disabled = viewerCurrentIndex >= viewerSlides.length - 1;

            viewerImg.classList.add('hidden'); viewerLoading.classList.remove('hidden');
            if (viewerCurrentObjectUrl) { URL.revokeObjectURL(viewerCurrentObjectUrl); viewerCurrentObjectUrl = null; }

            const blob = await StorageManager.getAttachmentBlob(slide.attId);
            if (!blob) { alert('画像データの取得に失敗しました。'); return; }

            viewerCurrentObjectUrl = URL.createObjectURL(blob);
            viewerImg.src = viewerCurrentObjectUrl; viewerDownload.href = viewerCurrentObjectUrl; viewerDownload.download = slide.filename || 'attachment';
            viewerImg.onload = () => { viewerLoading.classList.add('hidden'); viewerImg.classList.remove('hidden'); };
        }

        tooltip.addEventListener('click', async (e) => {
            const navBtn = e.target.closest('.tooltip-nav-btn');
            if (navBtn) {
                e.stopPropagation();
                const dir = parseInt(navBtn.dataset.carouselDir, 10);
                const total = parseInt(navBtn.dataset.totalSteps, 10);
                moveTooltipCarouselLocal(dir, total);
                return;
            }

            const imgContainer = e.target.closest('[data-att-id]'); if (!imgContainer) return;
            collectViewerSlides(imgContainer); viewer.classList.remove('hidden'); setTimeout(() => viewer.classList.remove('opacity-0'), 10); await openViewerSlide(viewerCurrentIndex);
        });

        document.getElementById('btn-viewer-prev-step').addEventListener('click', async (e) => { e.stopPropagation(); if (viewerCurrentIndex > 0) await openViewerSlide(viewerCurrentIndex - 1); });
        document.getElementById('btn-viewer-next-step').addEventListener('click', async (e) => { e.stopPropagation(); if (viewerCurrentIndex < viewerSlides.length - 1) await openViewerSlide(viewerCurrentIndex + 1); });

        const closeViewer = () => {
            viewer.classList.add('opacity-0');
            setTimeout(() => {
                viewer.classList.add('hidden'); viewerImg.src = '';
                if (viewerCurrentObjectUrl) { URL.revokeObjectURL(viewerCurrentObjectUrl); viewerCurrentObjectUrl = null; }
                viewerSlides = []; viewerCurrentIndex = -1;
                document.getElementById('viewer-step-no').textContent = 'Step -'; document.getElementById('viewer-step-title').textContent = 'タイトル未設定'; document.getElementById('viewer-step-description').textContent = '説明はありません'; document.getElementById('viewer-step-position').textContent = '0 / 0';
                document.getElementById('btn-viewer-prev-step').disabled = true; document.getElementById('btn-viewer-next-step').disabled = true;
            }, 200);
        };
        btnCloseViewer.addEventListener('click', closeViewer); viewer.addEventListener('click', (e) => { if(e.target === viewer) closeViewer(); });
    }

    function showManualTooltip(anchorEl, manualRaw, flowName) {

        const manual = { summary: '', steps: [], notes: '', linkedFlows: [], ...manualRaw };
        let html = `<div class="bg-slate-800 text-white px-3 py-2 flex items-center gap-2 shrink-0"><i data-lucide="book-open" class="w-4 h-4 text-blue-300"></i><span class="font-bold text-sm truncate flex-1">${escapeHTML(flowName)}</span></div><div class="flex flex-col flex-1 overflow-hidden bg-slate-50 relative">`;

        const stepCount = manual.steps ? manual.steps.length : 0;

                    step.attachments.forEach(att => {
                        html += `<div class="border border-slate-200 bg-white rounded p-1 flex flex-col items-center justify-center cursor-pointer hover:border-blue-500 hover:shadow-md transition-all h-16 relative overflow-hidden" data-att-id="${att.id}" data-filename="${escapeHTML(att.filename)}" data-step-index="${idx}" data-step-no="Step ${idx + 1}" data-step-title="${escapeHTML(step.title || 'タイトル未設定')}" data-step-description="${escapeHTML(step.description || '説明はありません')}" title="拡大表示">${att.thumbnail ? `<img src="${att.thumbnail}" class="w-full h-full object-cover">` : `<i data-lucide="file" class="w-6 h-6 text-slate-400"></i>`}<div class="absolute bottom-0 w-full bg-black/60 text-white text-[8px] truncate px-1 text-center">${escapeHTML(att.filename)}</div></div>`;
                    }); html += `</div>`;

            if (stepCount > 1) {

                    <button class="absolute left-2 top-3 bg-white/95 border border-slate-200 shadow-md rounded-full p-1 text-slate-600 hover:text-blue-600 hover:bg-blue-50 opacity-0 group-hover:opacity-100 transition-all z-20 tooltip-nav-btn" data-carousel-dir="-1" data-total-steps="${stepCount}"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>

        if (manual.notes || manual.linkedFlows.length > 0) {

            if (manual.notes) html += `<div class="font-bold text-slate-500 mb-1">備考</div><div class="text-slate-700 whitespace-pre-wrap">${escapeHTML(manual.notes)}</div>`;
            if (manual.linkedFlows.length > 0) {

        const flow = getFlowByPath(currentManualPath); if(!flow) return; const manual = flow.manual; const body = document.getElementById('manual-panel-body');
        if(!manual.linkedFlows) manual.linkedFlows = [];
        let html = `<div class="bg-white p-3 rounded border border-slate-200 shadow-sm"><div class="text-[10px] text-slate-500 font-bold mb-1">対象フロー</div><div class="font-bold text-slate-800 text-sm" id="manual-target-name">${escapeHTML(flow.name)}</div></div><div class="space-y-1 mt-4"><label class="block text-xs font-bold text-slate-600">概要 (Summary)</label><textarea class="w-full border border-slate-300 rounded p-2 text-sm manual-input focus:border-blue-500" data-field="summary" rows="2" placeholder="フローの目的や概要...">${escapeHTML(manual.summary)}</textarea></div><div class="space-y-2 mt-4"><div class="flex justify-between items-center border-b border-slate-200 pb-2"><label class="block text-xs font-bold text-slate-600">作業ステップ</label><button id="btn-add-step" class="text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold py-1 px-2 rounded flex items-center gap-1 border border-blue-200"><i data-lucide="plus" class="w-3 h-3"></i> 追加</button></div><div id="manual-steps-container" class="space-y-4">`;
        if(manual.steps.length === 0) html += `<div class="text-xs text-slate-400 text-center py-4 border-2 border-dashed border-slate-200 rounded">ステップがありません</div>`;
        manual.steps.forEach((step, index) => {
            html += `<div class="border border-slate-300 rounded bg-white p-3 relative group shadow-sm transition-shadow hover:shadow"><button class="absolute top-2 right-2 p-1 text-slate-300 hover:text-red-500 rounded btn-remove-step" data-index="${index}"><i data-lucide="x" class="w-3.5 h-3.5"></i></button><div class="mb-2"><span class="bg-slate-700 text-white text-[10px] font-bold px-1.5 py-0.5 rounded">Step ${index + 1}</span></div><input type="text" class="w-full border-b border-slate-200 mb-2 p-1 text-sm font-bold focus:border-blue-500 manual-step-input" data-index="${index}" data-field="title" value="${escapeHTML(step.title)}" placeholder="タイトル"><textarea class="w-full border border-slate-200 rounded p-1.5 text-xs focus:border-blue-500 manual-step-input min-h-[50px] mb-2" data-index="${index}" data-field="description" placeholder="具体的な作業内容...">${escapeHTML(step.description)}</textarea><div class="bg-slate-50 border border-slate-200 rounded p-2"><div class="text-[10px] font-bold text-slate-500 mb-2 flex items-center gap-1"><i data-lucide="paperclip" class="w-3 h-3"></i> 添付ファイル</div><div class="flex flex-wrap gap-2 mb-2 attachment-list" id="att-list-${step.id}">${step.attachments.map(att => `<div class="relative group border border-slate-200 bg-white rounded p-1 flex flex-col items-center justify-center w-20 h-20 shadow-sm text-center"><button class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-0.5 opacity-0 group-hover:opacity-100 transition-opacity btn-remove-att z-10" data-step-index="${index}" data-att-id="${att.id}"><i data-lucide="x" class="w-3 h-3"></i></button>${att.thumbnail ? `<img src="${att.thumbnail}" class="max-w-full max-h-[40px] object-contain mb-1">` : `<i data-lucide="file" class="w-6 h-6 text-slate-400 mb-1"></i>`}<div class="text-[8px] truncate w-full px-1 text-slate-600" title="${escapeHTML(att.filename)}">${escapeHTML(att.filename)}</div></div>`).join('')}</div><div class="file-drop-zone rounded p-3 text-center cursor-pointer relative overflow-hidden group hover:bg-blue-50"><input type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer step-file-input" data-step-index="${index}" multiple><div class="text-[10px] text-slate-500 flex flex-col items-center gap-1 group-hover:text-blue-600 transition-colors"><i data-lucide="upload-cloud" class="w-4 h-4"></i> <span>クリック または ドラッグ＆ドロップ</span></div></div></div></div>`;
        });
        html += `</div></div><div class="space-y-2 mt-6 border-t border-slate-200 pt-4"><div class="flex justify-between items-center"><label class="block text-xs font-bold text-slate-600">関連フロー (Links)</label><button class="btn-add-link text-[10px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded border border-indigo-200 hover:bg-indigo-100 flex items-center gap-1"><i data-lucide="link" class="w-3 h-3"></i> 紐付け</button></div><div class="space-y-1">`;
        if (manual.linkedFlows.length === 0) html += `<div class="text-xs text-slate-400 p-2 border border-dashed border-slate-200 rounded">関連フローはありません</div>`;
        else { manual.linkedFlows.forEach(linkId => { const target = findFlowById(linkId); if (target) html += `<div class="flex items-center justify-between bg-white border border-slate-200 rounded p-2 shadow-sm group"><div class="flex flex-col overflow-hidden text-xs"><span class="text-[9px] text-slate-400 truncate">${escapeHTML(target.parentL.name)} > ${escapeHTML(target.parentM.name)}</span><span class="font-bold text-indigo-700 truncate flex items-center gap-1"><i data-lucide="link-2" class="w-3 h-3"></i> ${escapeHTML(target.flow.name)}</span></div><button class="text-slate-300 hover:text-red-500 btn-remove-link shrink-0 p-1" data-id="${linkId}"><i data-lucide="x" class="w-4 h-4"></i></button></div>`; else html += `<div class="flex items-center justify-between bg-red-50 border border-red-200 rounded p-2 text-xs text-red-600 shadow-sm"><span class="flex items-center gap-1"><i data-lucide="alert-triangle" class="w-3 h-3"></i> 削除済のリンク</span><button class="text-red-400 hover:text-red-700 btn-remove-link shrink-0 p-1" data-id="${linkId}"><i data-lucide="x" class="w-4 h-4"></i></button></div>`; }); }
        html += `</div></div><div class="space-y-1 mt-4 border-t border-slate-200 pt-4 pb-8"><label class="block text-xs font-bold text-slate-600">備考 (Notes)</label><textarea class="w-full border border-slate-300 rounded p-2 text-sm manual-input focus:border-blue-500" data-field="notes" rows="2">${escapeHTML(manual.notes)}</textarea></div>`;
        body.innerHTML = html; lucide.createIcons({ root: body });
    }

    let currentLinkingFlowId = null;
    function setupLinkModal() {
        const modal = document.getElementById('link-modal'); const content = document.getElementById('link-modal-content');
        const close = () => { modal.classList.add('opacity-0'); content.classList.add('scale-95'); setTimeout(() => { modal.classList.add('hidden'); currentLinkingFlowId = null; }, 200); };
        document.getElementById('btn-close-link-modal').addEventListener('click', close); modal.addEventListener('click', (e) => { if(e.target === modal) close(); });
        document.getElementById('link-search').addEventListener('input', (e) => renderLinkTree(e.target.value.toLowerCase()));
    }
    function openLinkModal(sourceFlowId) {
        currentLinkingFlowId = sourceFlowId; document.getElementById('link-search').value = ''; renderLinkTree('');
        const modal = document.getElementById('link-modal'); const content = document.getElementById('link-modal-content');
        modal.classList.remove('hidden'); setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
    }
    function renderLinkTree(searchQuery = '') {
        const container = document.getElementById('link-tree-container'); let html = ''; let hasResults = false;
        const sourceNode = findFlowById(currentLinkingFlowId); if (!sourceNode || sourceNode.type !== 'S') return;
        const linkedIds = sourceNode.flow.manual.linkedFlows || [];
        state.flows.forEach(l => {
            let lHtml = ''; let hasLMatch = false;
            l.children.forEach(m => {
                let mHtml = ''; let hasMMatch = false;
                m.children.forEach(s => {
                    if (s.id === currentLinkingFlowId) return;
                    const isMatch = s.name.toLowerCase().includes(searchQuery) || m.name.toLowerCase().includes(searchQuery) || l.name.toLowerCase().includes(searchQuery);
                    if (searchQuery && !isMatch) return;
                    hasMMatch = true; const isAlreadyLinked = linkedIds.includes(s.id);
                    mHtml += `<div class="flex items-center justify-between p-2 pl-6 hover:bg-slate-50 border-t border-slate-100"><div class="text-xs flex flex-col"><span class="text-slate-700">${escapeHTML(s.name)}</span></div><button class="btn-select-link text-[10px] px-2 py-1 rounded font-bold ${isAlreadyLinked ? 'bg-slate-200 text-slate-500 cursor-not-allowed' : 'bg-blue-50 text-blue-600 hover:bg-blue-100 border border-blue-200'}" data-id="${s.id}" ${isAlreadyLinked ? 'disabled' : ''}>${isAlreadyLinked ? '追加済' : '追加'}</button></div>`;
                });
                if (hasMMatch) { hasLMatch = true; lHtml += `<div class="bg-slate-50 border-t border-slate-200"><div class="px-3 py-1.5 text-xs font-bold text-slate-600 flex items-center gap-1"><i data-lucide="folder" class="w-3 h-3"></i> ${escapeHTML(m.name)}</div>${mHtml}</div>`; }
            });
            if (hasLMatch) { hasResults = true; html += `<div class="border border-slate-200 rounded mb-2 overflow-hidden"><div class="bg-slate-100 px-3 py-2 text-xs font-bold text-slate-800 flex items-center gap-1"><i data-lucide="layers" class="w-3 h-3"></i> ${escapeHTML(l.name)}</div>${lHtml}</div>`; }
        });
        if (!hasResults) html = `<div class="text-center py-8 text-sm text-slate-500">選択できるフローが見つかりません</div>`;
        container.innerHTML = html; lucide.createIcons({ root: container });
        container.querySelectorAll('.btn-select-link').forEach(btn => btn.addEventListener('click', (e) => {
            const targetId = e.currentTarget.dataset.id; const sourceFlow = findFlowById(currentLinkingFlowId).flow;
            if (!sourceFlow.manual.linkedFlows.includes(targetId)) { sourceFlow.manual.linkedFlows.push(targetId); renderManualPanel(); updatePreview(); markDirty(); }
            document.getElementById('btn-close-link-modal').click();
        }));
    }

    async function exportZipProject() {
        showLoading('ZIPファイルを作成中...');
        try {
            const zip = new window.JSZip();
            zip.file('manifest.json', JSON.stringify({ version: '2.0.0', app: 'Flow Generator', exportedAt: new Date().toISOString(), projectId: state.meta.projectId, title: state.meta.title, flowsCount: state.flows.length }, null, 2));
            zip.file('flows.json', JSON.stringify(state, null, 2));
            const attFolder = zip.folder('attachments');
            const attachments = await StorageManager.getAttachmentsByProject(state.meta.projectId);
            for (const att of attachments) { if (att.blob) attFolder.file(att.id, att.blob); }
            const content = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(content); a.download = `${getSafeFilename(state.meta.title, getTimestamp())}.zip`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        } catch (e) { alert('ZIPエクスポートに失敗しました。'); console.error(e); } finally { hideLoading(); }
    }

    async function importZipProject(file) {
        if (!confirm('このZIPを読み込むと、現在編集中のプロジェクトは上書きされます。\n（※必要に応じて現在の状態をZIPエクスポートしてバックアップしてください）\n\n本当に読み込んでよろしいですか？')) { document.getElementById('zip-upload-input').value = ''; return; }
        showLoading('ZIPファイルを展開中...');
        try {
            const zip = await window.JSZip.loadAsync(file); const flowsFile = zip.file('flows.json');
            if (!flowsFile) throw new Error('無効なファイル形式です（flows.jsonがありません）。');
            const importedState = JSON.parse(await flowsFile.async('string'));
            if (!importedState.meta || !importedState.flows) throw new Error('不正なプロジェクト形式です（必須データが欠損しています）。');
            const newProjectId = `proj_${Date.now().toString(36)}`; importedState.meta.projectId = newProjectId;
            const attFolder = zip.folder('attachments'); let missingAttachments = 0;
            if (attFolder) {
                for (let l of importedState.flows) {
                    for (let m of l.children) {
                        for (let s of m.children) {
                            if (s.manual && s.manual.steps) {
                                for (let step of s.manual.steps) {
                                    if (step.attachments) {
                                        for (let att of step.attachments) {
                                            const oldId = att.id; att.id = genId('att'); att.projectId = newProjectId;
                                            const fileObj = attFolder.file(oldId);
                                            if (fileObj) { const blob = await fileObj.async('blob'); await StorageManager.saveAttachment(att, blob); } 
                                            else { console.warn(`[警告] 添付ファイル実体が見つかりません: ${att.filename}`); missingAttachments++; }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
            state = importedState; renderFull(); markDirty();
            if (missingAttachments > 0) setTimeout(() => alert(`プロジェクトは読み込まれましたが、一部の添付ファイル（${missingAttachments}件）の実体データがZIP内に見つかりませんでした。`), 500);
        } catch (e) { alert('ZIPの読み込みに失敗しました。\n' + e.message); console.error(e); } finally { hideLoading(); document.getElementById('zip-upload-input').value = ''; }
    }

    function setupGlobalEventListeners() {
        document.getElementById('btn-close-manual').addEventListener('click', closeManualPanel);
        document.addEventListener('keydown', async (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
            if ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === 'y' || (e.key.toLowerCase() === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }

            const viewer = document.getElementById('image-viewer');
            if (e.key === 'Escape') {
                if (!viewer.classList.contains('hidden')) document.getElementById('btn-close-viewer').click();
                else if (!document.getElementById('link-modal').classList.contains('hidden')) document.getElementById('btn-close-link-modal').click();
                else if (currentManualPath) closeManualPanel();
            }

            if (!viewer.classList.contains('hidden')) {
                if (e.key === 'ArrowLeft') { e.preventDefault(); document.getElementById('btn-viewer-prev-step').click(); return; }
                if (e.key === 'ArrowRight') { e.preventDefault(); document.getElementById('btn-viewer-next-step').click(); return; }
            }

            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                const tooltip = document.getElementById('manual-tooltip');
                if (tooltip.classList.contains('visible') && tooltip.querySelector('.carousel-slide')) {
                    const stepCount = tooltip.querySelectorAll('.carousel-slide').length;
                    if (stepCount > 1) { e.preventDefault(); moveTooltipCarouselLocal(e.key === 'ArrowLeft' ? -1 : 1, stepCount); }
                }
            }
        });
        
        document.getElementById('btn-zoom-in').addEventListener('click', () => adjustZoom(0.1));
        document.getElementById('btn-zoom-out').addEventListener('click', () => adjustZoom(-0.1));
        document.getElementById('btn-open-newtab').addEventListener('click', () => {
            const htmlCopy = document.documentElement.cloneNode(true);
            htmlCopy.querySelectorAll('script').forEach(s => { if (s.textContent.includes('INJECTED_DATA_START')) s.textContent = s.textContent.replace(/\/\*\s*INJECTED_DATA_START\s*\*\/[\s\S]*?\/\*\s*INJECTED_DATA_END\s*\*\//, `/* INJECTED_DATA_START */\n    const EMBEDDED_DATA = ${JSON.stringify(state, null, 4)};\n    /* INJECTED_DATA_END */`); });
            htmlCopy.querySelectorAll('svg[data-lucide]').forEach(svg => { const i = document.createElement('i'); i.setAttribute('data-lucide', svg.getAttribute('data-lucide')); const c = Array.from(svg.classList).filter(x => !x.startsWith('lucide')); if(c.length > 0) i.setAttribute('class', c.join(' ')); svg.parentNode.replaceChild(i, svg); });
            htmlCopy.querySelectorAll('.pdf-page, .page-inner, .capture-area-container').forEach(el => el.removeAttribute('style')); htmlCopy.querySelector('#form-container').innerHTML = ''; htmlCopy.querySelector('#manual-panel').classList.add('translate-x-full'); htmlCopy.querySelector('#manual-panel-body').innerHTML = '';
            window.open(URL.createObjectURL(new Blob(['<!DOCTYPE html>\n' + htmlCopy.outerHTML], { type: 'text/html;charset=utf-8' })), '_blank');
        });

        document.getElementById('btn-export-md').addEventListener('click', () => {
            let md = `# ${state.meta.title}\ndate: ${state.meta.date}\nauthor: ${state.meta.author || ''}\n\n`;
            state.flows.forEach(l => { md += `## ${l.name}${l.isBottleneck ? ' [ボトルネック]' : ''}\n`; l.children.forEach(m => { md += `### ${m.name}${m.isBottleneck ? ' [ボトルネック]' : ''}\n`; m.children.forEach(s => { md += `- ${s.name}${s.isBottleneck ? ' [ボトルネック]' : ''}\n`; if (s.manual && (s.manual.summary || s.manual.steps.length > 0 || s.manual.notes || s.manual.linkedFlows.length > 0)) { if (s.manual.summary) md += `  > ${s.manual.summary.replace(/\n/g, '  \n  > ')}\n`; s.manual.steps.forEach((step, idx) => { md += `  ${idx + 1}. ${step.title}\n`; if(step.description) md += `     ${step.description.replace(/\n/g, '\n     ')}\n`; }); if (s.manual.notes || s.manual.linkedFlows.length > 0) { md += `  ---\n`; if (s.manual.notes) md += `  備考: ${s.manual.notes.replace(/\n/g, '  \n  ')}\n`; s.manual.linkedFlows.forEach(linkId => { const tgt = findFlowById(linkId); if(tgt) md += `  🔗 -> [${tgt.flow.name}](${tgt.flow.id})\n`; }); } } }); }); md += `\n`; });
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([md], { type: 'text/markdown;charset=utf-8' })); a.download = `${getSafeFilename(state.meta.title, getTimestamp())}.md`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        });

        const mdUpload = document.getElementById('md-upload-input');
        document.getElementById('btn-import-md').addEventListener('click', () => mdUpload.click());

        mdUpload.addEventListener('change', (e) => {
            if (!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const markdownText = ev.target.result; const result = parseRichMarkdownToState(markdownText);
                    if (!result.state.flows || result.state.flows.length === 0) { alert("有効な構造が見つかりません。"); mdUpload.value = ''; return; }
                    state = result.state; renderFull(); markDirty();
                    const messages = [];
                    if (result.warnings.length > 0) messages.push(`- 解釈できなかった行: ${result.warnings.length}件`);
                    if (result.unresolvedLinks.length > 0) messages.push(`- 未解決の関連リンク: ${result.unresolvedLinks.length}件`);
                    if (messages.length > 0) setTimeout(() => { alert(`MDは読み込まれましたが、一部注意事項があります。\n\n${messages.join('\n')}`); }, 100);
                } catch (err) { console.error(err); alert('MDの読み込みに失敗しました。\n' + (err.message || err)); } finally { mdUpload.value = ''; }
            };
            reader.readAsText(e.target.files[0]);
        });

        document.getElementById('btn-export-zip').addEventListener('click', exportZipProject);
        const zipUpload = document.getElementById('zip-upload-input');
        document.getElementById('btn-import-zip').addEventListener('click', () => zipUpload.click());
        zipUpload.addEventListener('change', (e) => { if (e.target.files[0]) importZipProject(e.target.files[0]); });

        document.getElementById('btn-save-pdf').addEventListener('click', async (e) => {
            const btn = e.currentTarget; const originalHtml = btn.innerHTML;
            try {
                btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 生成中...'; showLoading('PDF生成中...'); document.getElementById('preview-container').style.overflow = 'hidden';
                const pdf = new window.jspdf.jsPDF('l', 'mm', 'a4'); if (document.fonts && document.fonts.ready) await document.fonts.ready; await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
                const pages = Array.from(document.getElementById('preview-wrapper').querySelectorAll('.capture-area-container'));
                for (let i = 0; i < pages.length; i++) {
                    document.getElementById('pdf-progress').textContent = `${i + 1} / ${pages.length}`;
                    const container = pages[i]; const pageEl = container.querySelector('.pdf-page'); const [oTrans, oW, oH] = [pageEl.style.transform, container.style.width, container.style.height];
                    pageEl.style.transition = 'none'; pageEl.style.transform = 'scale(1)'; container.style.width = PAGE_SIZES.w + 'px'; container.style.height = PAGE_SIZES.h + 'px';
                    const canvas = await htmlToImage.toCanvas(pageEl, { pixelRatio: 2, width: PAGE_SIZES.w, height: PAGE_SIZES.h, style: { transform: 'none', transformOrigin: 'top left' } });
                    pageEl.style.transition = ''; pageEl.style.transform = oTrans; container.style.width = oW; container.style.height = oH;
                    if (i > 0) pdf.addPage(); pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, PAGE_SIZES.mmW, PAGE_SIZES.mmH);
                }
                const ts = getTimestamp(); const pdfLink = document.createElement('a'); pdfLink.href = URL.createObjectURL(pdf.output('blob')); pdfLink.download = `${getSafeFilename(state.meta.title, ts)}.pdf`; document.body.appendChild(pdfLink); pdfLink.click(); document.body.removeChild(pdfLink); 
            } catch (err) { 
                console.error('[PDF Export Error]', err); 
                alert('PDF生成に失敗しました。'); 
            } finally { 
                btn.disabled = false; btn.innerHTML = originalHtml; hideLoading(); document.getElementById('preview-container').style.overflow = ''; adjustZoom(0); 
            }
        });
    }

    function setupResizeHandle() {
        const handle = document.getElementById('resize-handle'); 
        const leftPane = document.getElementById('left-pane'); 
        let isResizing = false;

        const startResize = () => { isResizing = true; document.body.style.cursor = 'col-resize'; };
        const stopResize = () => { isResizing = false; document.body.style.cursor = ''; };
        const doResize = (clientX) => {
            if (isResizing) { 
                leftPane.style.width = Math.max(380, Math.min(clientX, window.innerWidth * 0.7)) + 'px'; 
                adjustZoom(0); hideManualTooltip(); 
            }
        };

        handle.addEventListener('mousedown', startResize);
        handle.addEventListener('touchstart', startResize, { passive: true });

        window.addEventListener('mousemove', (e) => doResize(e.clientX));
        window.addEventListener('touchmove', (e) => doResize(e.touches[0].clientX), { passive: true });

        window.addEventListener('mouseup', stopResize);
        window.addEventListener('touchend', stopResize);
    }

    function autoAdjustDensity() {
        document.getElementById('preview-wrapper').querySelectorAll('.page-inner').forEach(inner => {
            inner.style.transform = 'none'; inner.style.width = '100%'; inner.style.marginLeft = '0';
            const page = inner.closest('.pdf-page'); const safeH = page.clientHeight - 60; const safeW = page.clientWidth - 70;
            inner.style.height = 'auto';
            let scaleX = inner.scrollWidth > safeW ? safeW / inner.scrollWidth : 1; let scaleY = inner.scrollHeight > safeH ? safeH / inner.scrollHeight : 1; let scale = Math.min(scaleX, scaleY);
            if (scale < 0.99) {
                scale = Math.max(0.4, scale - 0.01); inner.style.transformOrigin = 'top center'; inner.style.transform = `scale(${scale})`; inner.style.width = `${100 / scale}%`;
                const diffW = (page.clientWidth * (1 / scale)) - page.clientWidth; inner.style.marginLeft = `-${diffW / 2}px`;
            }
            inner.style.height = '';
        });
    }

    function adjustZoom(delta) {
        if (!document.getElementById('preview-container')) return;
        let targetScale = currentScale;
        if (delta === 0) targetScale = Math.max(0.1, Math.min((document.getElementById('preview-container').clientWidth - 20) / PAGE_SIZES.w, (document.getElementById('preview-container').clientHeight - 40) / PAGE_SIZES.h, 1.0));
        else targetScale += delta;
        targetScale = Math.max(0.2, Math.min(targetScale, 2.0));
        document.getElementById('preview-wrapper').querySelectorAll('.capture-area-container').forEach(c => { c.querySelector('.pdf-page').style.transform = `scale(${targetScale})`; c.style.width = (PAGE_SIZES.w * targetScale) + 'px'; c.style.height = (PAGE_SIZES.h * targetScale) + 'px'; });
        currentScale = targetScale; document.getElementById('zoom-level').textContent = Math.round(currentScale * 100) + '%';
    }

    window.addEventListener('DOMContentLoaded', init);
})();
</script>
